<!DOCTYPE html>

<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Подарунок ❤️</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #ff9a9e, #fad0c4);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
}

/* Картка */
.card {
    background: rgba(255,255,255,0.15);
    padding: 40px;
    border-radius: 20px;
    backdrop-filter: blur(10px);
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    text-align: center;
    max-width: 400px;
    position: relative;
}

/* Кнопки */
button {
    margin: 10px;
    padding: 12px 25px;
    border: none;
    border-radius: 25px;
    cursor: pointer;
}

.yes { background: #c0f0c0; }
.no {
    background: #ffb3b3;
    position: absolute;
}
.gift-btn {
    background: #ffd3b3;
    font-weight: bold;
}

.hidden { display: none; }

/* Сердечка */
.heart {
    position: fixed;
    top: -20px;
    font-size: 24px;
    animation: fall linear forwards;
}
@keyframes fall {
    to { transform: translateY(110vh); opacity: 0; }
}

/* 🎁 НОВА КОРОБКА */
.gift {
    position: relative;
    width: 240px;
    height: 160px;
    margin: 20px auto;
    perspective: 1500px;
}

/* низ */
.gift-base {
    width: 100%;
    height: 120px;
    background: linear-gradient(145deg, #d10000, #ff2e2e);
    border-radius: 12px;
    position: absolute;
    bottom: 0;
    box-shadow: 0 10px 25px rgba(0,0,0,0.4);
}

/* кришка */
.gift-lid {
    width: 100%;
    height: 70px;
    background: linear-gradient(145deg, #ff3b3b, #ff6b6b);
    border-radius: 12px 12px 8px 8px;
    position: absolute;
    top: 0;
    transform-origin: top;
    transition: transform 1s ease;
    z-index: 2;
}

/* відкриття */
.gift.open .gift-lid {
    transform: rotateX(-130deg) translateY(-10px);
}

/* стрічки */
.ribbon-v {
    position: absolute;
    width: 30px;
    height: 100%;
    background: #8b0000;
    left: 50%;
    transform: translateX(-50%);
}
.ribbon-h {
    position: absolute;
    width: 100%;
    height: 25px;
    background: #8b0000;
    top: 20px;
}

/* бантик */
.bow {
    position: absolute;
    top: -25px;
    left: 50%;
    transform: translateX(-50%);
    width: 70px;
    height: 40px;
    z-index: 3;
}
.bow::before,
.bow::after {
    content: "";
    position: absolute;
    width: 35px;
    height: 45px;
    background: #ff4d4d;
    border-radius: 50% 50% 0 50%;
}
.bow::before {
    left: 0;
    transform: rotate(-30deg);
}
.bow::after {
    right: 0;
    transform: rotate(30deg) scaleX(-1);
}

/* Квитки */
.ticket-container {
    position: relative;
    width: 320px;
    height: 180px;
    margin-top: 30px;
    opacity: 0;
    transform: translateY(50px);
    transition: 1s;
}
.ticket-container.show {
    opacity: 1;
    transform: translateY(0);
}

.ticket {
    position: absolute;
    width: 100%;
    max-width: 300px;

    background: linear-gradient(135deg, #ffb347, #ffcc33);
    padding: 12px;
    border-radius: 12px;
    overflow: hidden;

    box-shadow: 0 12px 30px rgba(0,0,0,0.35);

    opacity: 0;
    transform: translateY(-50px) rotate(0deg);
    transition: 1s;
}

.ticket img {
    width: 100%;
    border-radius: 8px;
}

/* вирізи */
.ticket::before,
.ticket::after {
    content: "";
    position: absolute;
    width: 28px;
    height: 28px;
    background: #fad0c4;
    border-radius: 50%;
    top: 50%;
    transform: translateY(-50%);
}
.ticket::before { left: -14px; }
.ticket::after { right: -14px; }

/* перфорація */
.perforation {
    position: absolute;
    top: 10%;
    bottom: 10%;
    left: 50%;
    border-left: 2px dashed rgba(0,0,0,0.4);
    transform: translateX(-50%);
}

/* позиції */
.ticket1 { top: 0; left: 20px; }
.ticket2 { top: 10px; left: 0; }

.ticket1.show {
    opacity: 1;
    transform: translateY(0) rotate(15deg);
}
.ticket2.show {
    opacity: 1;
    transform: translateY(0) rotate(-10deg);
}
</style>

</head>

<body>

<div class="card">

<div id="step1">
    <h1>З Днем закоханих ❤️</h1>
    <p>У мене є подарунок для тебе...</p>
    <button onclick="showSurprise()">Якииий?</button>
</div>

<div id="step2" class="hidden">
    <h2>🎶 Ми йдемо на концерт!</h2>
    <p><b>ШУГАРАААА</b></p>
    <p>Підеш зі мною? 💕</p>
    <button class="yes" onclick="yesAnswer()">Так 😍</button>
    <button class="no" id="noBtn">Ні 🙈</button>
</div>

<div id="final" class="hidden">
    <h2>Урааа 💖</h2>
    <p>Я знала, що ти погодишся 😄</p>

```
<button class="gift-btn" onclick="openGift()">Відкрити подарунок 🎁</button>

<div id="giftBox" class="gift">
    <div class="gift-lid">
        <div class="ribbon-h"></div>
    </div>

    <div class="gift-base">
        <div class="ribbon-v"></div>

    <div class="bow"></div>
</div>

<div id="ticketBox" class="ticket-container">

</div>

</div>

<script>
function createHearts() {
    for (let i = 0; i < 25; i++) {
        let heart = document.createElement("div");
        heart.className = "heart";
        heart.innerHTML = "💖";
        heart.style.left = Math.random() * 100 + "vw";
        heart.style.animationDuration = (2 + Math.random() * 3) + "s";
        document.body.appendChild(heart);
        setTimeout(() => heart.remove(), 5000);
    }
}

function showSurprise() {
    step1.classList.add("hidden");
    step2.classList.remove("hidden");
    createHearts();
}

const noBtn = document.getElementById("noBtn");
noBtn.addEventListener("mouseover", () => {
    noBtn.style.left = Math.random()*200+"px";
    noBtn.style.top = Math.random()*100+"px";
});

function yesAnswer() {
    step2.classList.add("hidden");
    final.classList.remove("hidden");
    createHearts();
}

function openGift() {
    giftBox.classList.add("open");

    setTimeout(() => {
        ticketBox.classList.add("show");
        setTimeout(() => {
            ticket1.classList.add("show");
            ticket2.classList.add("show");
            createHearts();
        }, 200);
    }, 1000);
}
</script>

</body>
</html>
