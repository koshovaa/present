<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Подарунок ❤️</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #ff9a9e, #fad0c4);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
}

/* Картка */
.card {
    background: rgba(255,255,255,0.15);
    padding: 40px;
    border-radius: 20px;
    backdrop-filter: blur(10px);
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    text-align: center;
    max-width: 400px;
    position: relative;
}

/* Кнопки */
button {
    margin: 10px;
    padding: 12px 25px;
    border: none;
    border-radius: 25px;
    cursor: pointer;
}

.yes { background: #c0f0c0; }
.no { background: #ffb3b3; position: absolute; }
.gift-btn { background: #ffd3b3; font-weight: bold; }

.hidden { display: none; }

/* Сердечка */
.heart {
    position: fixed;
    top: -20px;
    font-size: 24px;
    animation: fall linear forwards;
}
@keyframes fall { to { transform: translateY(110vh); opacity: 0; } }

/* 🎁 Коробка з ефектом об’єму */
.gift {
    position: relative;
    width: 240px;
    height: 160px;
    margin: 20px auto 50px;
    perspective: 1200px;
}

/* Низ коробки */
.gift-base {
    width: 100%;
    height: 120px;
    background: linear-gradient(145deg, #d10000, #ff2e2e);
    border-radius: 12px;
    position: absolute;
    bottom: 0;
    box-shadow: 0 10px 25px rgba(0,0,0,0.4);
    z-index: 1;
}

/* Кришка коробки */
.gift-lid {
    width: 100%;
    height: 60px;
    background: linear-gradient(145deg, #ff3b3b, #ff6b6b);
    border-radius: 12px 12px 8px 8px;
    position: absolute;
    top: 0;
    transform-origin: left bottom;
    transition: transform 1s cubic-bezier(0.4, 0, 0.2, 1);
    z-index: 3;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding-top: 5px;
}

/* Відкриття кришки з ефектом об’єму */
.gift.open .gift-lid {
    transform: rotateY(-25deg) rotateX(20deg) translateZ(10px);
}

/* Стрічки */
.ribbon-v {
    position: absolute;
    width: 20px;
    height: 100%;
    background: #8b0000;
    left: 50%;
    transform: translateX(-50%);
    z-index: 2;
}
.ribbon-h {
    position: absolute;
    width: 100%;
    height: 20px;
    background: #8b0000;
    top: 15px;
    z-index: 2;
}

/* Бантик - смайлик на кришці */
.bow {
    position: absolute;
    top: -35px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 100px;
    z-index: 4;
}

/* Квитки */
.ticket-container {
    position: relative;
    width: 320px;
    height: 180px;
    margin-top: 30px;
    opacity: 0;
    transform: translateY(50px);
    transition: 1s;
}
.ticket-container.show {
    opacity: 1;
    transform: translateY(0);
}

.ticket {
    position: absolute;
    width: 100%;
    max-width: 300px;
    background: linear-gradient(145deg, #f5e6d3, #e0c097);
    padding: 12px;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 12px 30px rgba(0,0,0,0.35);
    opacity: 0;
    transform: translateY(-50px) rotate(0deg);
    transition: 1s;
}

.ticket img { width: 100%; border-radius: 8px; }

/* Вирізи */
.ticket::before, .ticket::after {
    content: "";
    position: absolute;
    width: 28px;
    height: 28px;
    background: #fad0c4;
    border-radius: 50%;
    top: 50%;
    transform: translateY(-50%);
}
.ticket::before { left: -14px; }
.ticket::after { right: -14px; }

/* Перфорація */
.perforation {
    position: absolute;
    top: 10%;
    bottom: 10%;
    left: 90%;
    border-left: 2px dashed rgba(0,0,0,0.4);
    transform: translateX(-50%);
}

/* Позиції квитків */
.ticket1 { top: 0; left: 20px; }
.ticket2 { top: 10px; left: 0; }

.ticket1.show {
    opacity: 1;
    transform: translateY(0) rotate(15deg);
}
.ticket2.show {
    opacity: 1;
    transform: translateY(0) rotate(-10deg);
}
</style>
</head>
<body>

<div class="card">

<div id="step1">
    <h1>З Днем закоханих ❤️</h1>
    <p>У мене є подарок для тебе...</p>
    <button onclick="showSurprise()">Якииий?</button>
</div>

<div id="step2" class="hidden">
    <h2>🎶 Ми йдемо на концерт!</h2>
    <p><b>ШУГАРАААА</b></p>
    <p>Підеш зі мною? 💕</p>
    <button class="yes" onclick="yesAnswer()">Канєшно!😍</button>
    <button class="no" id="noBtn">Не піду🙈</button>
</div>

<div id="final" class="hidden">
    <h2>Урааа 💖</h2>
    <p>Я знала, що погодишся 😄</p>
	<p>Люблю тебе ❤️</p>

    <button class="gift-btn" onclick="openGift()">Відкрити 🎁</button>

    <div id="giftBox" class="gift">
        <div class="gift-lid">
            <div class="ribbon-h"></div>
            <div class="bow">💝</div>
        </div>
        <div class="gift-base">
            <div class="ribbon-v"></div>
        </div>
    </div>

    <div id="ticketBox" class="ticket-container">
        <div class="ticket ticket1" id="ticket1">
            <div class="perforation"></div>
            <img src="ticket1.jpg">
        </div>
        <div class="ticket ticket2" id="ticket2">
            <div class="perforation"></div>
            <img src="ticket2.jpg">
        </div>
    </div>
</div>

</div>

<script>
function createHearts() {
    for (let i = 0; i < 25; i++) {
        let heart = document.createElement("div");
        heart.className = "heart";
        heart.innerHTML = "💖";
        heart.style.left = Math.random() * 100 + "vw";
        heart.style.animationDuration = (2 + Math.random() * 3) + "s";
        document.body.appendChild(heart);
        setTimeout(() => heart.remove(), 5000);
    }
}

function showSurprise() {
    document.getElementById("step1").classList.add("hidden");
    document.getElementById("step2").classList.remove("hidden");
    createHearts();
}

const noBtn = document.getElementById("noBtn");
noBtn.addEventListener("mouseover", moveButton);
noBtn.addEventListener("touchstart", moveButton);
function moveButton() {
    const card = document.querySelector(".card");
    const maxX = card.clientWidth - noBtn.clientWidth;
    const maxY = card.clientHeight - noBtn.clientHeight;
    noBtn.style.left = Math.random() * maxX + "px";
    noBtn.style.top = Math.random() * maxY + "px";
}

function yesAnswer() {
    document.getElementById("step2").classList.add("hidden");
    document.getElementById("final").classList.remove("hidden");
    createHearts();
}

function openGift() {
    const giftBox = document.getElementById("giftBox");
    giftBox.classList.add("open");

    setTimeout(() => {
        const ticketBox = document.getElementById("ticketBox");
        ticketBox.classList.add("show");
        setTimeout(() => {
            document.getElementById("ticket1").classList.add("show");
            document.getElementById("ticket2").classList.add("show");
            createHearts();
        }, 200);
    }, 500);
}
</script>

</body>
</html>
