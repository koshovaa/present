<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Подарунок для тебе ❤️</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #ff9a9e, #fad0c4);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
            color: #333;
            overflow: hidden;
        }

        .card {
            background: rgba(255, 255, 255, 0.15);
            padding: 40px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            max-width: 400px;
            position: relative;
        }

        button {
            margin: 10px;
            padding: 12px 25px;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }

        button:hover {
            opacity: 0.85;
        }

        .yes {
            background: #c0f0c0;
            color: #2a2a2a;
        }

        .no {
            background: #ffb3b3;
            color: #2a2a2a;
            position: absolute;
        }

        .gift-btn {
            background: #ffd3b3;
            color: #4a3a3a;
            font-weight: bold;
        }

        /* ❤️ Сердечка */
        .heart {
            position: fixed;
            top: -20px;
            font-size: 24px;
            animation: fall linear forwards;
            z-index: 9999;
            pointer-events: none;
        }

        @keyframes fall {
            to {
                transform: translateY(110vh);
                opacity: 0;
            }
        }

        /* 3D коробка */
        .box {
            position: relative;
            width: 250px;
            height: 150px;
            margin: 20px auto;
            cursor: pointer;
            perspective: 1500px;
        }

        .box-body {
            background: #ffe0a3;
            width: 100%;
            height: 120px;
            border-radius: 10px;
            position: relative;
            z-index: 1;
            transform-style: preserve-3d;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }

        .box-lid {
            background: #ffcc66;
            width: 100%;
            height: 50px;
            border-radius: 10px 10px 0 0;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 2;
            transform-origin: top center;
            transition: transform 1s ease, box-shadow 0.5s;
        }

        .box.open .box-lid {
            transform: rotateX(-120deg) translateY(-20px);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
        }

        /* Квиток */
        .ticket-frame {
            margin-top: 20px;
            padding: 20px;
            background: #fff;
            color: #333;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 350px;
            border: 2px dashed #ccc;
            overflow: hidden;
            opacity: 0;
            transform: translateY(-50px) scale(0.8) rotate(-10deg);
            transition: all 0.6s ease;
        }

        .ticket-frame.show {
            opacity: 1;
            transform: translateY(0) scale(1) rotate(0deg);
            animation: bounceRotate 0.8s ease forwards;
        }

        @keyframes bounceRotate {
            0% {
                transform: translateY(-50px) scale(0.8) rotate(-10deg);
            }

            50% {
                transform: translateY(10px) scale(1.05) rotate(5deg);
            }

            70% {
                transform: translateY(-5px) scale(0.95) rotate(-3deg);
            }

            100% {
                transform: translateY(0) scale(1) rotate(0deg);
            }
        }

        /* Декоративні дірки на квитку */
        .ticket-frame::before,
        .ticket-frame::after {
            content: "";
            position: absolute;
            width: 10px;
            height: 100%;
            background: repeating-linear-gradient(to bottom, transparent, transparent 5px, #ccc 5px, #ccc 10px);
            top: 0;
        }

        .ticket-frame::before {
            left: 0;
            border-radius: 0 5px 5px 0;
        }

        .ticket-frame::after {
            right: 0;
            border-radius: 5px 0 0 5px;
        }

        .fade {
            opacity: 1;
            transform: translateY(0);
            transition: 0.6s;
        }

        .fade.hidden {
            opacity: 0;
            transform: translateY(20px);
            pointer-events: none;
        }
    </style>
</head>
<body>

<div class="card">
    <!-- Екран 1 -->
    <div id="step1" class="fade">
        <h1>З Днем закоханих ❤️</h1>
        <p>У мене є подарунок для тебе...</p>
        <button onclick="showSurprise()">Якиииий?</button>
    </div>

    <!-- Екран 2 -->
    <div id="step2" class="fade hidden">
        <h2>🎶 Ми йдемо на концерт!</h2>
        <p><b>ШУГАРАААА</b></p>
        <p>Підеш зі мною? 💕</p>
        <button class="yes" onclick="yesAnswer()">Так 😍</button>
        <button class="no" id="noBtn">Ні 🙈</button>
    </div>

    <!-- Екран 3 -->
    <div id="final" class="fade hidden">
        <h2>Урааа 💖</h2>
        <p>Я знала, що ти погодишся 😄</p>
        <button class="gift-btn" onclick="openGift()">Відкрити подарунок 🎁</button>

        <!-- коробка -->
        <div id="giftBox" class="box">
            <div class="box-lid"></div>
            <div class="box-body"></div>
        </div>

        <!-- квиток -->
        <div id="ticketBox">
            <div class="ticket-frame">
                <img src="ticket.jpg" alt="Квиток">
            </div>
        </div>
    </div>
</div>

<script>
    // Сердечка
    function createHearts() {
        for (let i = 0; i < 30; i++) {
            let heart = document.createElement("div");
            heart.className = "heart";
            heart.innerHTML = "💖";
            heart.style.left = Math.random() * 100 + "vw";
            heart.style.animationDuration = (2 + Math.random() * 3) + "s";
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 5000);
        }
    }

    // Переход 1 → 2
    function showSurprise() {
        document.getElementById("step1").classList.add("hidden");
        setTimeout(() => {
            document.getElementById("step2").classList.remove("hidden");
        }, 400);
        createHearts();
    }

    // "Ні" тікає
    const noBtn = document.getElementById("noBtn");
    noBtn.addEventListener("touchstart", moveButton);
    noBtn.addEventListener("mouseover", moveButton);

    function moveButton() {
        const card = document.querySelector(".card");
        const maxX = card.clientWidth - noBtn.clientWidth;
        const maxY = card.clientHeight - noBtn.clientHeight;
        noBtn.style.left = Math.random() * maxX + "px";
        noBtn.style.top = Math.random() * maxY + "px";
    }

    // 2 → 3
    function yesAnswer() {
        document.getElementById("step2").classList.add("hidden");
        setTimeout(() => {
            document.getElementById("final").classList.remove("hidden");
        }, 400);
        createHearts();
    }

    // відкриття коробки
    function openGift() {
        const box = document.getElementById("giftBox");
        box.classList.add("open");
        setTimeout(() => {
            const ticket = document.querySelector(".ticket-frame");
            ticket.classList.add("show");
            createHearts();
        }, 1000);
    }
</script>

</body>
</html>
